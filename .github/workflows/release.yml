name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install mise and pinned tools
        uses: jdx/mise-action@v2
        with:
          version: 2026.1.11
          cache_key_prefix: mise-v1

      - name: Install Rust components
        run: rustup component add --toolchain 1.89.0-x86_64-unknown-linux-gnu rustfmt clippy

      - name: Verify release inputs
        run: mise exec -- task release

      - name: Prepare release bundle
        run: |
          mkdir -p dist
          cp LICENSE dist/LICENSE
          cp README.md dist/README.md
          tar -C dist -czf dist/hatch-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz hatch LICENSE README.md
          sha256sum dist/hatch dist/hatch-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz > dist/sha256sums.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/hatch
            dist/hatch-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz
            dist/sha256sums.txt
