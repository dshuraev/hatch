name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install mise and pinned tools
        uses: jdx/mise-action@v2
        with:
          version: 2026.1.11
          cache_key_prefix: mise-v1

      - name: Install Rust components
        run: rustup component add --toolchain 1.89.0-x86_64-unknown-linux-gnu rustfmt clippy

      - name: Run fast verification gate
        run: mise exec -- task ci
