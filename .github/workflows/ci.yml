name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install mise and pinned tools
        uses: jdx/mise-action@v2
        with:
          version: 2026.1.11

      - name: Run fast verification gate
        run: mise exec -- task ci
