version: "3"

vars:
  REPORTS_DIR: reports
  FUZZ_TARGETS:
    - "config_check_reader"

tasks:
  default:
    desc: Check & build
    cmds:
      - task: check
      - task: build

  build:
    desc: Build the project
    cmds:
      - cargo build

  clean:
    desc: Remove build artifacts
    cmds:
      - cargo clean

  format:
    desc: Format Rust sources
    cmds:
      - cargo fmt

  clippy:
    desc: Run clippy with warnings denied
    cmds:
      - cargo clippy -- -D warnings

  audit:
    desc: Audit dependencies for known vulnerabilities
    cmds:
      - cargo audit

  deny:
    desc: Run cargo-deny checks
    cmds:
      - cargo deny check

  coverage:
    desc: Generate coverage reports
    cmds:
      - mkdir -p {{.REPORTS_DIR}}/coverage-html
      - cargo llvm-cov --text --ignore-filename-regex '/test/' | tee {{.REPORTS_DIR}}/coverage.txt
      - cargo llvm-cov --lcov --ignore-filename-regex '/test/' --output-path {{.REPORTS_DIR}}/coverage.lcov
      - cargo llvm-cov --html --ignore-filename-regex '/test/' --output-dir {{.REPORTS_DIR}}/coverage-html

  geiger:
    desc: Report unsafe Rust usage (informational)
    cmds:
      - mkdir -p {{.REPORTS_DIR}}
      - cargo geiger | tee {{.REPORTS_DIR}}/geiger.txt || true

  miri:
    desc: Check for UB
    cmds:
      - cargo +nightly miri test

  fuzz:all:
    desc: Run fuzzer
    run: always
    env:
      RUST_BACKTRACE: "1"
    vars:
      SANITIZER: address
      MAX_LEN: 4096
      TIMEOUT: 5
      RSS_LIMIT_MB: 4096
      USE_VALUE_PROFILE: 1
      RUNS: 0
      EXTRA_FLAGS: ""
    cmds:
      - for: {var: FUZZ_TARGETS}
        cmd: >
          cargo +nightly fuzz run "{{trimSuffix ".rs" .ITEM}}"
          --sanitizer {{.SANITIZER}} --
          -runs={{.RUNS}}
          -max_len={{.MAX_LEN}}
          -timeout={{.TIMEOUT}}
          -use_value_profile={{.USE_VALUE_PROFILE}}
          -print_final_stats=1
          {{.EXTRA_FLAGS}}

  coupling:
    desc: Run coupling checks
    cmds:
      - mkdir -p {{.REPORTS_DIR}}
      - cargo coupling | tee {{.REPORTS_DIR}}/coupling.md

  check:
    desc: Run all configured checks
    cmds:
      - task: clippy
      - task: audit
      - task: deny
      - task: geiger
      - task: miri
      - task: fuzz:all
      - task: coupling
      - task: coverage
