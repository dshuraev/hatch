version: "3"

vars:
  REPORTS_DIR: reports
  RELEASE_DIR: dist
  TASK_CACHE_DIR: .task-cache
  DENY_CARGO_HOME: "{{.TASK_CACHE_DIR}}/cargo-home"
  DENY_CARGO_DENY_HOME: "{{.TASK_CACHE_DIR}}/cargo-deny"
  FUZZ_TARGETS:
    - "config_check_reader"

tasks:
  default:
    desc: Check & build
    cmds:
      - task: check
      - task: build

  build:
    desc: Build the project
    cmds:
      - cargo build --locked

  build:release:
    desc: Build release artifacts
    cmds:
      - cargo build --release --locked

  clean:
    desc: Remove build artifacts
    cmds:
      - cargo clean

  format:
    desc: Verify Rust formatting
    cmds:
      - cargo fmt --all --check

  clippy:
    desc: Run clippy with warnings denied
    cmds:
      - cargo clippy --all-targets --all-features -- -D warnings

  test:
    desc: Run unit and integration tests
    cmds:
      - cargo test --all-targets --locked

  audit:
    desc: Audit dependencies for known vulnerabilities
    cmds:
      - cargo audit

  deny:
    desc: Run cargo-deny checks
    cmds:
      - mkdir -p {{.DENY_CARGO_HOME}} {{.DENY_CARGO_DENY_HOME}}
      - CARGO_HOME={{.DENY_CARGO_HOME}} CARGO_DENY_HOME={{.DENY_CARGO_DENY_HOME}} cargo deny check

  coverage:
    desc: Generate coverage reports
    cmds:
      - mkdir -p {{.REPORTS_DIR}}/coverage-html
      - cargo llvm-cov --text --ignore-filename-regex '/test/' | tee {{.REPORTS_DIR}}/coverage.txt
      - cargo llvm-cov --lcov --ignore-filename-regex '/test/' --output-path {{.REPORTS_DIR}}/coverage.lcov
      - cargo llvm-cov --html --ignore-filename-regex '/test/' --output-dir {{.REPORTS_DIR}}/coverage-html

  geiger:
    desc: Report unsafe Rust usage (informational)
    cmds:
      - mkdir -p {{.REPORTS_DIR}}
      - cargo geiger | tee {{.REPORTS_DIR}}/geiger.txt || true

  miri:
    desc: Check for UB
    cmds:
      - RUSTUP_TOOLCHAIN=nightly-2025-10-31 rustup component add miri rust-src
      - cargo +nightly-2025-10-31 miri test

  fuzz:all:
    desc: Run fuzzer
    run: always
    env:
      RUST_BACKTRACE: "1"
    vars:
      SANITIZER: address
      MAX_LEN: 4096
      TIMEOUT: 5
      RSS_LIMIT_MB: 4096
      USE_VALUE_PROFILE: 1
      RUNS: 0
      EXTRA_FLAGS: ""
    cmds:
      - for: {var: FUZZ_TARGETS}
        cmd: >
          cargo +nightly-2025-10-31 fuzz run "{{trimSuffix ".rs" .ITEM}}"
          --sanitizer {{.SANITIZER}} --
          -runs={{.RUNS}}
          -max_len={{.MAX_LEN}}
          -timeout={{.TIMEOUT}}
          -use_value_profile={{.USE_VALUE_PROFILE}}
          -print_final_stats=1
          {{.EXTRA_FLAGS}}

  coupling:
    desc: Run coupling checks
    cmds:
      - mkdir -p {{.REPORTS_DIR}}
      - cargo coupling | tee {{.REPORTS_DIR}}/coupling.md

  auditable:
    desc: Build auditable release binary
    cmds:
      - mkdir -p {{.RELEASE_DIR}}
      - cargo auditable build --release --locked
      - cp target/release/hatch {{.RELEASE_DIR}}/hatch

  bloat:
    desc: Report release binary size contributors (informational)
    cmds:
      - mkdir -p {{.REPORTS_DIR}}
      - cargo bloat --release --crates | tee {{.REPORTS_DIR}}/bloat.txt || true

  ci:
    desc: Run the fast CI gate
    cmds:
      - task: format
      - task: clippy
      - task: test
      - task: deny
      - task: build:release

  release:
    desc: Verify release inputs and build auditable artifacts
    cmds:
      - task: ci
      - task: audit
      - task: auditable

  check:
    desc: Run all configured checks, including heavyweight analysis
    cmds:
      - task: ci
      - task: audit
      - task: geiger
      - task: miri
      - task: fuzz:all
      - task: coupling
      - task: bloat
      - task: coverage
